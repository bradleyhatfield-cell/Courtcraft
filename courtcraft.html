<!DOCTYPE html>
<html lang="en" style="background:#060d18;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CourtCraft — Smart Practice Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
html,body{background:#060d18 !important;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060d18 !important;color:#f1f5f9;font-family:'IBM Plex Sans','Segoe UI',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:#0f172a;}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}
input,textarea,select{background:#1e293b;border:1px solid #334155;border-radius:6px;color:#f1f5f9;padding:8px 10px;font-size:13px;font-family:inherit;width:100%;outline:none;box-sizing:border-box;}
select option{background:#1e293b;}
textarea{resize:vertical;}
button{cursor:pointer;font-family:inherit;border:none;}
.btn{border-radius:5px;padding:4px 10px;font-size:11px;color:#fff;transition:opacity .15s;}
.btn:hover{opacity:.85;}
h1,h2,h3,.condensed{font-family:'Barlow Condensed',sans-serif;letter-spacing:.03em;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.divider{border-top:1px solid #1e293b;margin:16px 0;}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border-color .2s;}
.card:hover{border-color:rgba(232,119,34,.35);}
.section-bar{width:3px;height:16px;background:#e87722;border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.span2{grid-column:span 2;}
.label{display:block;color:#64748b;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.form-box{background:#0f172a;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px;}
.empty-state{text-align:center;padding:48px 20px;color:#334155;}
.empty-state .icon{font-size:40px;margin-bottom:12px;}
.tab-btn{background:none;border:none;color:#475569;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:8px 13px;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab-btn.active{color:#e87722;border-bottom-color:#e87722;}
.toggle-row{display:flex;gap:6px;flex-wrap:wrap;}
.toggle-btn{border-radius:5px;padding:5px 12px;font-size:11px;color:#fff;background:#1e293b;border:none;cursor:pointer;transition:background .15s;}
.warn-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);border-radius:8px;padding:10px 14px;margin-top:12px;}
.plan-section{margin-bottom:18px;}
.plan-section-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.info-bar{background:rgba(232,119,34,.06);border:1px solid rgba(232,119,34,.2);border-radius:8px;padding:8px 12px;margin-top:8px;}
</style>
</head>
<body>

<div id="app" style="background:#060d18;min-height:100vh;"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const STORAGE_PREFIX = 'cc_';
const save = (k,v) => localStorage.setItem(STORAGE_PREFIX+k, JSON.stringify(v));
const load = (k,d) => { try{ const v=localStorage.getItem(STORAGE_PREFIX+k); return v?JSON.parse(v):d; }catch{return d;} };

const DEFAULT_DRILLS = [
  {id:"d1",name:"3v3 Half-Court (No Dribble)",source:"CLA / Sarama",ageMin:10,ageMax:18,levels:["beginner","intermediate","advanced"],duration:12,focus:["s6","s9","s12"],description:"Play 3v3: no dribbling until past half-court. Forces players to read spacing and move early.",coachingCues:["Find the open gap","Move before you catch","What do you see before the pass?"],format:"game",players:6,phase:"game"},
  {id:"d2",name:"1v1 Live with Invitation",source:"CLA / Representative Practice",ageMin:8,ageMax:18,levels:["beginner","intermediate","advanced"],duration:8,focus:["s11","s6","s12"],description:"Defender gives an invitation (shows a lane). Attacker reads and reacts. Defender plays live after first move.",coachingCues:["Read the defender's feet","Commit to the gap","What did the defender give you?"],format:"game",players:2,phase:"game"},
  {id:"d3",name:"4v4 Dribble Handoff Game",source:"ByAnyMeansCoaches",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:15,focus:["s9","s6","s5"],description:"4v4 where a point scores for every successful DHO completed, plus basket scores.",coachingCues:["Shoulders to defender on DHO","Attack the gap immediately","Space the floor after"],format:"game",players:8,phase:"game"},
  {id:"d4",name:"Mikan Drill",source:"Classic / Fundamental",ageMin:6,ageMax:14,levels:["beginner","intermediate"],duration:5,focus:["s1","s17"],description:"Alternating underhand layups each side without letting the ball touch the floor.",coachingCues:["High soft release","Land balanced","Keep rhythm"],format:"skill",players:1,phase:"skill"},
  {id:"d5",name:"Shell Drill",source:"Fundamental / Defensive",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:10,focus:["s13","s9","s16"],description:"4v4 perimeter passing. Defenders practice deny, help, and rotation positioning.",coachingCues:["Pistols on ball movement","Shrink on skip","Talk — call every pass"],format:"skill",players:8,phase:"skill"},
  {id:"d6",name:"Chaos Dribbling",source:"CLA / Attentional Focus",ageMin:6,ageMax:12,levels:["beginner","intermediate"],duration:6,focus:["s5","s6"],description:"All players dribble in confined space. Coach gives tasks without stopping dribble.",coachingCues:["Eyes up","React — don't wait","Use your body to protect"],format:"game",players:6,phase:"warmup"},
  {id:"d7",name:"2v2+2 Playmaker Game",source:"Sarama / Small-Sided",ageMin:10,ageMax:18,levels:["intermediate","advanced"],duration:12,focus:["s6","s9","s12"],description:"2v2 with 2 neutral sideline players as pass outlets. Offense keeps possession on made basket.",coachingCues:["Use neutrals to reset","Drive to collapse, kick out","Read the help"],format:"game",players:6,phase:"game"},
  {id:"d8",name:"Form Shooting Progression",source:"Fundamental",ageMin:6,ageMax:14,levels:["beginner"],duration:8,focus:["s3","s17"],description:"Start 3 feet from basket. One-hand form shots. Progress back every 5 makes.",coachingCues:["Elbow under ball","Follow through","Feet shoulder-width"],format:"skill",players:1,phase:"skill"},
  {id:"d9",name:"5v0 to 5v5 Transition",source:"Game-Based / Transition",ageMin:13,ageMax:18,levels:["intermediate","advanced"],duration:15,focus:["s9","s12","s6"],description:"Walk through offensive set 5v0, then immediately play live 5v5.",coachingCues:["Stretch defense","Play what you see","Communicate actions"],format:"game",players:10,phase:"game"},
  {id:"d10",name:"Zig-Zag Defensive Footwork",source:"Fundamental / Defense",ageMin:8,ageMax:18,levels:["beginner","intermediate"],duration:6,focus:["s13","s17"],description:"Defender slides in zig-zag pattern. Low stance, lead foot direction, no crossing.",coachingCues:["Stay low","Lead foot points direction","Hands active"],format:"skill",players:1,phase:"warmup"},

  // ── CLA Drills ──────────────────────────────────────────────────
  {id:"d11",name:"Back Attack Finishing",source:"CLA / Breakthrough Basketball",ageMin:10,ageMax:18,levels:["intermediate","advanced"],duration:8,focus:["s1","s6"],description:"Attacker starts with back to basket, defender behind. Coach passes — attacker turns and finishes before defender recovers. Forces reading of defender position on the catch.",coachingCues:["Feel where the defender is before you catch","Attack the space they give you","Finish with body control — don't jump into contact"],format:"game",players:2,phase:"skill"},

  {id:"d12",name:"3v3 Compressed Width",source:"CLA / Dr Dish Basketball",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:12,focus:["s6","s10","s9"],description:"Play 3v3 using only 2/3 the court width marked by cones. Compressed space forces faster decision-making, sharper cuts, and precise passing angles under extreme pressure.",coachingCues:["Find the gap before it closes","Move before you catch — space is limited","Sharp cuts only — no drifting"],format:"game",players:6,phase:"game"},

  {id:"d13",name:"Dribble Limit Game",source:"CLA / Breakthrough Basketball",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:15,focus:["s6","s9","s10"],description:"4v4 or 5v5 with a maximum of 2 dribbles per player per possession. Forces ball movement, off-ball cuts, and reading the defense before catching. Progress to 3 dribbles as players improve.",coachingCues:["Decide before you catch — no wasted dribbles","Cut hard to create a passing angle","Read the defense — where is the advantage?"],format:"game",players:8,phase:"game"},

  {id:"d14",name:"Advantage 3v2 Attack",source:"CLA / Basketball Immersion",ageMin:10,ageMax:18,levels:["beginner","intermediate","advanced"],duration:10,focus:["s6","s12","s16"],description:"Offense always starts 3 attackers vs 2 defenders. Forces defense to communicate and rotate; forces offense to identify and exploit the open man before defense recovers.",coachingCues:["Attack immediately — don't let defense set","Find the open man before help arrives","Defense: communicate who has ball"],format:"game",players:5,phase:"game"},

  {id:"d15",name:"Shot Value Constraint",source:"CLA / Breakthrough Basketball",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:15,focus:["s6","s3"],description:"3v3 or 4v4 with changed scoring: layups = 3pts, catch-and-shoot threes = 2pts, pull-up mid-range = 1pt, contested mid-range = 0pts. Players self-regulate shot selection based on quality.",coachingCues:["Is this a gold medal shot?","Pass up the 1-point shot for the 3-point shot","Attack the basket first — earn the layup"],format:"game",players:6,phase:"game"},

  {id:"d16",name:"1v1 Full Court",source:"CLA / Basketball Immersion",ageMin:12,ageMax:18,levels:["intermediate","advanced"],duration:8,focus:["s11","s5","s15"],description:"1v1 from end line to end line, no help defenders. Forces attacker to use dribble moves, change of pace and reads at full speed. Defender must contain without fouling.",coachingCues:["Change speed — don't dribble at one pace","Protect the ball with your body","Defender: stay between ball and basket"],format:"game",players:2,phase:"game"},

  {id:"d17",name:"Continuous 3v3 Transition",source:"CLA / Sarama",ageMin:13,ageMax:18,levels:["intermediate","advanced"],duration:15,focus:["s12","s6","s16"],description:"Two teams of 3. When a team scores or ball goes out, defending team immediately becomes attacking team — no reset. Forces constant transition reads, communication, and conditioning.",coachingCues:["Sprint — don't walk into transition","Call out numbers: 3v2 go!","First pass ahead, then read the numbers"],format:"game",players:6,phase:"game"},

  {id:"d18",name:"Weak Hand Constraint",source:"CLA — Individual Constraint",ageMin:8,ageMax:18,levels:["beginner","intermediate","advanced"],duration:6,focus:["s2","s5"],description:"Apply to any ball-handling, finishing, or 1v1 drill: non-dominant hand only. Apply individually to players who rely on their strong hand. Not for beginners who haven't found either hand yet.",coachingCues:["Slow down — let the weak hand learn","Eyes up even when it feels uncomfortable","Don't reach across — stay square and attack straight"],format:"skill",players:1,phase:"skill"},

  // ── Athleticism & Strength ──────────────────────────────────────
  {id:"d19",name:"Box Jumps",source:"Strength & Conditioning",ageMin:12,ageMax:18,levels:["beginner","intermediate","advanced"],duration:8,focus:["s21","s24","s19"],description:"Jump onto a box (30–50cm), step down, reset, repeat. 3 sets of 8. Builds explosive leg power and safe landing mechanics. Progress to lateral box jumps for basketball-specific movement.",coachingCues:["Hips back on landing — absorb through the legs","Reset fully before each rep — this is power not cardio","Arms drive the jump — use them"],format:"skill",players:1,phase:"conditioning"},

  {id:"d20",name:"Lateral Cone Shuttles",source:"Strength & Conditioning",ageMin:10,ageMax:18,levels:["beginner","intermediate","advanced"],duration:6,focus:["s22","s15"],description:"5 cones spaced 1m apart in a line. Sprint and touch each cone laterally and back. 4 sets of 30 seconds with full recovery between sets. Builds lateral quickness, change of direction, and first-step explosiveness.",coachingCues:["Low hips — stay in an athletic stance throughout","Push off the outside foot to change direction","Touch the cone — make it honest"],format:"skill",players:1,phase:"warmup"},

  {id:"d21",name:"Depth Jumps",source:"Strength & Conditioning / Plyometrics",ageMin:14,ageMax:18,levels:["intermediate","advanced"],duration:10,focus:["s21","s24","s19"],description:"Step off a box, land, then immediately explode upward as high as possible. 3 sets of 6 with full recovery. Trains the stretch-shortening cycle — the key mechanism for improving reactive jumping ability.",coachingCues:["Minimal ground contact time — think hot coals","Land on the balls of your feet not your heels","The jump starts the moment you land — no pause"],format:"skill",players:1,phase:"conditioning"},

  {id:"d22",name:"Single-Leg Romanian Deadlift",source:"Strength & Conditioning",ageMin:13,ageMax:18,levels:["beginner","intermediate","advanced"],duration:8,focus:["s23","s19","s22"],description:"Stand on one leg, hinge at the hip, reach toward the floor with the opposite hand, return to standing. 3 sets of 8 each side. Builds hamstring strength, hip stability and balance — critical for safe landing and change of direction.",coachingCues:["Flat back throughout — don't round","Feel the stretch in the standing hamstring","Hold a slight bend in the standing knee — don't lock out"],format:"skill",players:1,phase:"conditioning"},

  {id:"d23",name:"Trap Bar Deadlift",source:"Strength & Conditioning / Garage Strength",ageMin:14,ageMax:18,levels:["intermediate","advanced"],duration:10,focus:["s21","s23","s19"],description:"Load a trap bar, stand inside it, drive through the floor to standing. 3 sets of 5 at moderate weight. Builds overall lower body and posterior chain strength — the foundation of basketball explosiveness.",coachingCues:["Chest up, drive the floor away — don't pull up","Engage the lats before the lift — protect the lower back","Stand tall at the top — hips fully locked out"],format:"skill",players:1,phase:"conditioning"},

  {id:"d24",name:"Ankle Bounding",source:"Strength & Conditioning / Plyometrics",ageMin:12,ageMax:18,levels:["beginner","intermediate","advanced"],duration:6,focus:["s22","s21","s24"],description:"Rapid short hops forward on both feet using only the ankles — minimal knee bend. 4 sets of 20 metres with full recovery. Builds ankle stiffness and reactive strength — directly improves first-step quickness and jump power.",coachingCues:["Think of your ankles as springs — stiff and fast","Arms pump to help rhythm — keep them tight","Stay tall — don't lean forward"],format:"skill",players:1,phase:"warmup"},

  {id:"d25",name:"Copenhagen Plank",source:"Strength & Conditioning / Injury Prevention",ageMin:13,ageMax:18,levels:["beginner","intermediate","advanced"],duration:6,focus:["s23","s19"],description:"Side plank with the top leg resting on a bench, bottom leg hanging. 3 sets of 30 seconds each side. Builds adductor (groin) strength — one of the most commonly injured muscle groups in basketball — and hip stability.",coachingCues:["Keep hips stacked — don't let the top hip drop back","Squeeze the glute of the working side","Progress by lifting the bottom leg off the floor"],format:"skill",players:1,phase:"cooldown"},
];

const CONCEPTS = [
  {id:"c1",category:"Transition",icon:"⚡",title:"Primary & Secondary Break",summary:"Transition is the highest-value possession — defense is outnumbered and disorganised.",keyIdeas:["Sprint lanes wide to stretch the defense horizontally","Ball-pusher reads numbers: 2v1 attack, 3v2 pass ahead, even numbers slow down","Secondary break: attack before the fifth defender arrives","Triggers: made basket, rebound, turnover — push immediately"],teachingProgression:["3v0 half-court: walk through lane spacing and touch points","3v2 secondary break: live reads, finish or reset","5v5 live — award bonus points for transition baskets"],saramaRef:"Transforming Basketball — Ch. 4"},
  {id:"c2",category:"Spacing",icon:"📐",title:"Floor Spacing Principles",summary:"Spacing creates driving lanes and help-side dilemmas. Good spacing means the defense can never guard two threats at once.",keyIdeas:["Five-out as default: all players above the arc unless cutting","Spacing rule: if your defender can help on a drive, you are too close","Corner spacing keeps weak-side help honest","Spacing is dynamic — when one cuts, another fills"],teachingProgression:["5v0 spacing walk-through: coach drives, players correct positions","4v4 constraint: defense scores if two offensive players are within 3 feet","5v5 with spacing score tracked alongside basket score"],saramaRef:"Transforming Basketball — Ch. 6"},
  {id:"c3",category:"Shot Priorities",icon:"🥇",title:"Gold Medal Shots",summary:"A shot-quality framework. Not all shots are equal — develop a hierarchy that players use in live play.",keyIdeas:["Gold: layup or dunk from an offensive advantage — always take it","Silver: open catch-and-shoot from a spot the player has rehearsed","Bronze: mid-range or pull-up from a slight advantage","No medal: contested, off-balance — pass out","Framework: Is this better than what I could create next?"],teachingProgression:["Watch film together — classify every shot as gold/silver/bronze/no-medal","Shooting games where point values match the medal system","3v3 with post-possession debrief: What medal was that?"],saramaRef:"Transforming Basketball — Ch. 8"},
  {id:"c4",category:"Screens",icon:"🧱",title:"Screen Actions & Reads",summary:"Screens are decision-making moments for both the screener and ball-handler — not choreography.",keyIdeas:["Ball screen: screener reads — pop if hedge, roll if defender goes under","Off-ball screen: curl if chasing, fade if fronting, straight cut if lost","The screener hunts advantages too — not just the ball-handler","Down screen: arrive late — early arrival gives the defender position","Stagger screen: user reads each defender separately"],teachingProgression:["2v0 then 2v2: walk the screen action, then play live","3v3 constraint: every possession must include a screen action","Film review: what did the defense give, did the offense take it?"],saramaRef:"Transforming Basketball — Ch. 10"},
  {id:"c5",category:"Cuts",icon:"✂️",title:"Cutting Actions",summary:"Cutting is a response to what the defense gives — every cut is a read, not a pattern.",keyIdeas:["Basket cut: defender turns head or helps — go backdoor immediately","L-cut: set up defender high, cut sharp to catch low","Give-and-go: pass and read defender — if they watch the ball, cut","Timing is everything — a cut without a ready passer is wasted movement","Cutters read the defender, not the ball"],teachingProgression:["2v1 cutting game: cutter must read defender to score","3v3 live cuts only — no dribbling, all scoring via cut-and-catch","5v5 with verbal cue: cutter calls backdoor or L-cut to build language"],saramaRef:"Transforming Basketball — Ch. 10"},
  {id:"c6",category:"Triggers & Actions",icon:"🎯",title:"Triggers, Actions & Dominoes",summary:"Offense flows from triggers (reads) to actions (responses) to dominoes (chain reactions). Every great offensive play starts with a player reading a defensive mistake.",keyIdeas:["Trigger: a defensive condition that creates an opportunity","Action: the immediate response to the trigger","Domino: the chain of advantages the action creates downstream","Teach players to see two moves ahead: if I drive here, what does that open?","Randomise practice environments so players learn to find triggers","Examples of Triggers → Actions → Dominoes:\n• Trigger: help defender cheats toward the ball / Action: backdoor cut / Domino: layup, or if help rotates → corner three opens\n• Trigger: defender goes under a ball screen / Action: pull-up jumper off the screen / Domino: if defender adjusts to go over → drive opens on the next screen\n• Trigger: closeout defender is off-balance / Action: one dribble drive / Domino: help rotates from weak side → skip pass to corner shooter\n• Trigger: post defender fronts / Action: lob pass over the top / Domino: weak-side help collapses → kick out to wing three\n• Trigger: on-ball defender ball-watches after a pass / Action: give-and-go cut / Domino: if help comes → second cutter is open"],teachingProgression:["3v3 find the trigger — coach pauses and asks what is the trigger right now?","Video analysis: identify trigger, action, and domino chains in game footage","5v5: offense must verbalise the trigger before acting"],saramaRef:"Transforming Basketball — Ch. 7"},
  {id:"c7",category:"Defense",icon:"🛡️",title:"Defensive Principles",summary:"Players who understand why they are in a position make better decisions than those following a system.",keyIdeas:["Ball pressure always first — no free catches, no free dribbles","Help-side: see ball and man — never watch only your own player","Closeout: sprint then chop — arrive under control to take away the drive","Communication is defense — silence means guessing","Funnel drives into help, not baseline"],teachingProgression:["Shell drill: stationary passing, then add movement, then live","1v1 closeout drill with live play after","5v5 defensive communication score: a point per loud correct call"],saramaRef:"Transforming Basketball — Ch. 12"},
  {id:"c8",category:"Decision Making",icon:"🧠",title:"Offensive Advantages",summary:"Basketball is a game of advantages. Teach players to see, create, and exploit them — not run plays.",keyIdeas:["Numerical: more attackers than defenders in an area — attack immediately","Positional: attacker in a space where the defender cannot recover in time","Momentum: attacker moving, defender static — attack before they set","Teach scanning: before the catch, what do you see?","Reduce play-calling — let players find advantages. Ask what did you see, not why didn't you run it"],teachingProgression:["3v3 name the advantage — players must identify before shooting","Constraints games that force advantage-seeking, no set plays","Post-session debrief: What was the best advantage you found today?"],saramaRef:"Transforming Basketball — Ch. 5"},
];

// ── These are now dynamic — read from settings ───────────────────────────────
const LEVEL_COLORS={beginner:"#22c55e",intermediate:"#f97316",advanced:"#ef4444"};
const CAT_COLORS={Transition:"#e87722",Spacing:"#3b82f6","Shot Priorities":"#f59e0b",Screens:"#8b5cf6",Cuts:"#10b981","Triggers & Actions":"#ef4444",Defense:"#64748b","Decision Making":"#06b6d4"};

// Default settings — overridden by user's saved settings
const DEFAULT_SETTINGS = {
  levels: ["beginner","intermediate","advanced"],
  // focusOptions removed — skills are now the single source of truth
  // Skills: {id, label} — one unified object used on drills and player profiles
  skills: [
    {id:"s1",  label:"Finishing at rim"},
    {id:"s2",  label:"Weak hand finishing"},
    {id:"s3",  label:"Shooting"},
    {id:"s4",  label:"Free throws"},
    {id:"s5",  label:"Ball handling"},
    {id:"s6",  label:"Decision making"},
    {id:"s7",  label:"Court vision"},
    {id:"s8",  label:"Reading screens"},
    {id:"s9",  label:"Off-ball movement"},
    {id:"s10", label:"Spacing"},
    {id:"s11", label:"1v1 attacking"},
    {id:"s12", label:"Transition offense"},
    {id:"s13", label:"Defense"},
    {id:"s14", label:"Closeout technique"},
    {id:"s15", label:"Defensive footwork"},
    {id:"s16", label:"Communication"},
    {id:"s17", label:"Footwork / pivoting"},
    {id:"s18", label:"Leadership"},
    {id:"s19", label:"Athleticism"},
    {id:"s20", label:"IQ / reads"},
    {id:"s21", label:"Explosiveness"},
    {id:"s22", label:"Speed & agility"},
    {id:"s23", label:"Core strength"},
    {id:"s24", label:"Vertical jump"},
  ],
};

// Live getters — always read from current settings
function getSettings() { return state.settings || DEFAULT_SETTINGS; }
function LEVEL_OPTIONS(){ return getSettings().levels; }
function FOCUS_OPTIONS(){ return SKILLS().map(s=>s.id); } // compat — returns skill ids
function ATTRIBUTES()   { return getSettings().skills || DEFAULT_SETTINGS.skills; } // legacy compat
function SKILLS()       { return getSettings().skills || DEFAULT_SETTINGS.skills; }
// drill.focus is an array of skill ids — this just returns it directly
function drillFocusTags(drill) { return drill.focus||[]; }
// Resolve skill id to label for display
function skillLabel(id) {
  const s = SKILLS().find(sk => sk.id === id);
  return s ? s.label : id;
}
function noteCatColor(c){ const cols={Strength:"#22c55e",Weakness:"#ef4444",Technical:"#3b82f6",Tactical:"#8b5cf6",Mental:"#f59e0b","Focus Area":"#e87722"}; return cols[c]||"#64748b"; }

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  tab: 'plan',
  drills: load('drills', DEFAULT_DRILLS),
  favorites: load('favorites', []),
  players: load('players', []),
  teams: load('teams', []),
  sessions: load('sessions', []),
  // sub-views
  playerView: 'list', selectedPlayer: null, playerForm: null,
  teamView: 'list', selectedTeam: null, teamForm: null, pickingPlayers: false,
  libSearch: '', libLevel: '', libFocus: '',
  showDrillForm: false, editDrill: null,
  conceptSelected: null, conceptFilter: '',
  // plan builder — 3-step wizard
  planStep: 1,
  planMode: 'general', planTeamId: '', planPlayerIds: [],
  planAge: 12, planLevel: 'intermediate', planDuration: 60,
  planFocus: [], planPlayerCount: 10,
  generatedPlan: null, planSaved: false,
  planSessionType: 'full',
  // settings
  settings: load('settings', DEFAULT_SETTINGS),
  settingsSection: 'attributes',
};

// ── Migration: merge any new default drills/skills into saved state ───────────
const DATA_VERSION = 4; // bump this whenever DEFAULT_DRILLS or DEFAULT_SETTINGS.skills changes
(function migrate() {
  const savedVersion = parseInt(localStorage.getItem('cc_dataVersion') || '0');
  if (savedVersion >= DATA_VERSION) return;

  // Merge new default drills (add any that don't exist in saved drills)
  const savedDrillIds = new Set(state.drills.map(d => d.id));
  const newDrills = DEFAULT_DRILLS.filter(d => !savedDrillIds.has(d.id));
  if (newDrills.length > 0) {
    state.drills = [...state.drills, ...newDrills];
    save('drills', state.drills);
  }

  // Merge new default skills (add any that don't exist in saved settings)
  const savedSettings = state.settings || DEFAULT_SETTINGS;
  const savedSkillIds = new Set((savedSettings.skills || []).map(s => s.id));
  const newSkills = DEFAULT_SETTINGS.skills.filter(s => !savedSkillIds.has(s.id));
  if (newSkills.length > 0) {
    savedSettings.skills = [...(savedSettings.skills || []), ...newSkills];
    state.settings = {...savedSettings};
    save('settings', state.settings);
  }

  localStorage.setItem('cc_dataVersion', DATA_VERSION);
})();

const FOCUS_KEYWORD_MAP = {
  'finish':'finishing','layup':'finishing','layups':'finishing',
  'shoot':'shooting','shot':'shooting','three':'shooting','free throw':'shooting',
  'dribble':'ball-handling','handle':'ball-handling','weak hand':'ball-handling',
  'decision':'decision-making','read':'decision-making','iq':'decision-making','turnover':'decision-making',
  'space':'spacing','spacing':'spacing',
  'defense':'defense','defend':'defense','closeout':'defense',
  'footwork':'footwork','pivot':'footwork',
  'communication':'communication','talk':'communication',
  'attack':'attacking','drive':'attacking','transition':'attacking',
  '1v1':'1v1','one on one':'1v1',
};

function extractWeaknesses() {
  const { planMode, planTeamId, planPlayerIds, players, teams } = state;
  let contextLabel = 'General Group';
  let rawWeaknesses = [];
  let notesContext = [];

  const notesToSkillIds = (notes) => {
    const ids = new Set();
    notes.forEach(n => {
      // Skill rating — only weaknesses drive drill matching
      if (n._skill && n.rating === 'weakness') {
        ids.add(n._skill);
        return;
      }
      // Free-text weakness notes — match skill label keywords to skill ids
      if (n.category === 'Weakness' || n.category === 'Focus Area') {
        const text = (n.title + ' ' + (n.content||'')).toLowerCase();
        SKILLS().forEach(s => { if (text.includes(s.label.toLowerCase())) ids.add(s.id); });
      }
    });
    return [...ids];
  };

  if (planMode === 'team') {
    const t = teams.find(x => x.id === planTeamId);
    if (t) {
      contextLabel = t.name;
      (t.notes||[]).forEach(n => {
        notesContext.push('['+n.category+'] '+n.title+(n.content?': '+n.content:''));
        if ((n._skill && n.rating==='weakness') || n.category === 'Weakness' || n.category === 'Focus Area') rawWeaknesses.push({source:t.name,...n});
      });
      players.filter(p => t.playerIds?.includes(p.id)).forEach(p => {
        (p.notes||[]).forEach(n => {
          notesContext.push(p.name+': ['+n.category+'] '+n.title+(n.content?': '+n.content:''));
          if ((n._skill && n.rating==='weakness') || n.category === 'Weakness' || n.category === 'Focus Area') rawWeaknesses.push({source:p.name,...n});
        });
      });
    }
  } else if (planMode === 'players' && planPlayerIds.length > 0) {
    const sps = players.filter(p => planPlayerIds.includes(p.id));
    contextLabel = sps.map(p => p.name).join(', ');
    sps.forEach(p => {
      (p.notes||[]).forEach(n => {
        notesContext.push(p.name+': ['+n.category+'] '+n.title+(n.content?': '+n.content:''));
        if (n.category === 'Weakness' || n.category === 'Focus Area') rawWeaknesses.push({source:p.name,...n});
      });
    });
  }

  const skillIds = notesToSkillIds(rawWeaknesses);
  return { skillIds, rawWeaknesses, contextLabel, notesContext };
}

function generatePlan() {
  const { planAge, planLevel, planDuration, planFocus, planPlayerCount, planSessionType, drills } = state;
  const sessionType = planSessionType || 'full';
  const { skillIds, rawWeaknesses, contextLabel, notesContext } = extractWeaknesses();
  const allSkillIds = [...new Set([...planFocus, ...skillIds])];

  // ── Session type configs ──────────────────────────────────────────────────
  const SESSION_TYPES = {
    full: {
      label: 'Full Session',
      sections: [
        { title:'Warm-Up / Activation',  pct:0.15, phases:['warmup','skill'],         drillCount:1, note:'Get players moving and mentally engaged.' },
        { title:'Skill Development',     pct:0.25, phases:['skill'],                   drillCount:2, note:null },
        { title:'Main Game',             pct:0.45, phases:['game'],                    drillCount:2, note:'Apply skills under game pressure. Minimise stoppages.' },
        { title:'Cool Down / Reflection',pct:0.15, phases:['cooldown','skill'],        drillCount:1, note:'Ask: What weakness did you work on today?' },
      ]
    },
    game: {
      label: 'Game-Based',
      sections: [
        { title:'Warm-Up / Activation',  pct:0.15, phases:['warmup','skill'],         drillCount:1, note:'Quick activation — get competitive immediately.' },
        { title:'Game 1',                pct:0.35, phases:['game'],                    drillCount:1, note:'First game constraint — focus on the session theme.' },
        { title:'Game 2',                pct:0.35, phases:['game'],                    drillCount:2, note:'Progress the constraint or raise the stakes.' },
        { title:'Cool Down / Reflection',pct:0.15, phases:['cooldown','skill'],        drillCount:1, note:'What trigger did you find most today?' },
      ]
    },
    skills: {
      label: 'Skills Focus',
      sections: [
        { title:'Warm-Up / Activation',  pct:0.15, phases:['warmup','skill'],         drillCount:1, note:'Specific activation — prepare the skill you are about to train.' },
        { title:'Skill Block 1',         pct:0.35, phases:['skill'],                   drillCount:2, note:'Deliberate practice — coach cues, quality reps.' },
        { title:'Skill Block 2',         pct:0.35, phases:['skill','game'],            drillCount:2, note:'Apply the skill under light pressure.' },
        { title:'Cool Down',             pct:0.15, phases:['cooldown','skill'],        drillCount:1, note:'Finish with reflection: what improved?' },
      ]
    },
    speed: {
      label: 'Speed & Agility',
      sections: [
        { title:'Activation',            pct:0.20, phases:['warmup'],                  drillCount:2, note:'Dynamic movement prep — increase heart rate gradually.' },
        { title:'Speed Block',           pct:0.35, phases:['conditioning','warmup'],   drillCount:2, note:'Maximum effort — full recovery between reps.' },
        { title:'Agility & Reaction',    pct:0.30, phases:['conditioning','warmup'],   drillCount:2, note:'Change of direction under fatigue.' },
        { title:'Cool Down & Mobility',  pct:0.15, phases:['cooldown','skill'],        drillCount:1, note:'Static stretching — hips, hamstrings, calves.' },
      ]
    },
    strength: {
      label: 'Strength',
      sections: [
        { title:'Activation',            pct:0.15, phases:['warmup'],                  drillCount:1, note:'Glute activation and joint prep before loading.' },
        { title:'Strength Block 1',      pct:0.35, phases:['conditioning'],            drillCount:2, note:'Primary compound movements — heaviest loads of the session.' },
        { title:'Strength Block 2',      pct:0.35, phases:['conditioning'],            drillCount:2, note:'Accessory work and injury prevention exercises.' },
        { title:'Cool Down',             pct:0.15, phases:['cooldown','skill'],        drillCount:1, note:'Stretch the muscles worked — hold 30–45 seconds each.' },
      ]
    },
    athleticism: {
      label: 'Athleticism',
      sections: [
        { title:'Activation',            pct:0.15, phases:['warmup'],                  drillCount:2, note:'Plyometric prep — ankle hops, bounding, lateral movement.' },
        { title:'Power & Explosiveness', pct:0.30, phases:['conditioning'],            drillCount:2, note:'Maximum effort jumps and throws. Full recovery.' },
        { title:'Skill Integration',     pct:0.30, phases:['skill','game'],            drillCount:2, note:'Apply athleticism in basketball-specific movement.' },
        { title:'Cool Down',             pct:0.25, phases:['cooldown','conditioning'], drillCount:1, note:'Mobility work — hips, thoracic spine, ankles.' },
      ]
    },
  };

  const config = SESSION_TYPES[sessionType] || SESSION_TYPES.full;

  const warnings = drills.filter(d =>
    planAge >= d.ageMin && planAge <= d.ageMax &&
    d.levels.includes(planLevel) &&
    d.players > 1 && d.players > planPlayerCount
  ).map(d => '"'+d.name+'" needs '+d.players+'+ players');

  const eligible = drills.filter(d =>
    planAge >= d.ageMin && planAge <= d.ageMax &&
    d.levels.includes(planLevel) &&
    (d.players <= 1 || d.players <= planPlayerCount)
  );

  const scoreDrill = (d, sectionPhases) => {
    let score = 0;
    // Phase match — strong preference for correct phase
    if (sectionPhases.includes(d.phase || 'skill')) score += 20;
    // Skill/weakness match
    if (allSkillIds.length > 0) score += drillFocusTags(d).filter(ft => allSkillIds.includes(ft)).length * 10;
    // Favourites
    if (state.favorites.includes(d.id)) score += 3;
    // Small random factor for variety
    score += Math.random() * 2;
    return score;
  };

  const used = new Set();
  const pickTop = (pool, n) => {
    const result = [];
    for (const d of pool) { if (!used.has(d.id) && result.length < n) { result.push(d); used.add(d.id); } }
    return result;
  };

  // Build each section
  const totalPct = config.sections.reduce((sum, s) => sum + s.pct, 0);
  let timeRemaining = planDuration;
  const builtSections = config.sections.map((sec, i) => {
    const isLast = i === config.sections.length - 1;
    const duration = isLast ? timeRemaining : Math.round(planDuration * (sec.pct / totalPct));
    if (!isLast) timeRemaining -= duration;

    // Score and sort eligible drills for this section's phases
    const pool = [...eligible].sort((a,b) => scoreDrill(b, sec.phases) - scoreDrill(a, sec.phases));
    const sectionDrills = pickTop(pool, sec.drillCount);

    // Build section note
    const matchedLabels = [...new Set(sectionDrills.flatMap(d => drillFocusTags(d)).filter(id => allSkillIds.includes(id)))].slice(0,2).map(id => skillLabel(id));
    const note = sec.note || (matchedLabels.length > 0 ? 'Targeting: '+matchedLabels.join(', ')+'.' : '');

    return { title: sec.title, duration, drills: sectionDrills, notes: note };
  });

  const weaknessSummary = rawWeaknesses.slice(0,4).map(w => w.source+': '+w.title);
  const focusLabel = allSkillIds.length > 0
    ? allSkillIds.slice(0,3).map(id => skillLabel(id)).join(', ')
    : 'balanced development';

  let coachNote = rawWeaknesses.length > 0
    ? 'Plan prioritised around identified weaknesses: '+weaknessSummary.join(' · ')+'.'
    : notesContext.length > 0
      ? 'Session tailored for '+contextLabel+'. Notes: '+notesContext.slice(0,2).join('; ')+'.'
      : config.label+' session — '+planDuration+' min, focused on '+focusLabel+'.';

  return {
    title: config.label+' — '+focusLabel.split(',')[0].trim(),
    subtitle: 'Age '+planAge+' · '+planLevel+' · '+planDuration+' min · '+planPlayerCount+' players',
    contextLabel, coachNotes: coachNote, weaknessSummary, skillIds: allSkillIds, warnings,
    sections: builtSections,
  };
}


function renderPlanWizard() {

  const stepNav = `
  <div style="display:flex;align-items:center;gap:0;margin-bottom:28px">
    ${steps.map((s,i) => {
      const n = i+1;
      const active = step === n;

      const col = done ? '#22c55e' : active ? '#e87722' : '#334155';
      const textCol = done ? '#22c55e' : active ? '#fff' : '#475569';
      return `
      <div style="display:flex;align-items:center;flex:1">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
          <div style="width:28px;height:28px;border-radius:50%;background:${done?'#22c55e':active?'#e87722':'#1e293b'};border:2px solid ${col};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${done?'#000':active?'#fff':'#475569'}">${done?'✓':n}</div>

// ── TAB: Library ──────────────────────────────────────────────────────────────
function renderLibrary() {
  const { drills, favorites, libSearch, libLevel, libFocus, showDrillForm, editDrill } = state;
  const filtered = drills.filter(d=>
    (!libSearch||d.name.toLowerCase().includes(libSearch.toLowerCase())||d.source.toLowerCase().includes(libSearch.toLowerCase()))&&
    (!libLevel||d.levels.includes(libLevel))&&(!libFocus||drillFocusTags(d).includes(libFocus))
  );
  const sorted = [...filtered].sort((a,b)=>(favorites.includes(b.id)?1:0)-(favorites.includes(a.id)?1:0));

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><h2 class="condensed" style="font-size:22px;color:#fff;margin-bottom:4px">Drill Library</h2><p style="color:#475569;font-size:13px">Your curated drill database. ⭐ pins favourites to the top.</p></div>
      <button class="btn" style="background:#e87722;padding:8px 16px;font-size:13px;font-weight:700" onclick="newDrill()">+ Add Drill</button>
    </div>
    ${showDrillForm||editDrill?renderDrillForm():''}
    <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
      <input style="flex:1;min-width:140px" placeholder="Search…" value="${libSearch}" oninput="setState({libSearch:this.value})"/>
      <select style="width:130px" onchange="setState({libLevel:this.value})"><option value="">All levels</option>${LEVEL_OPTIONS().map(l=>`<option value="${l}" ${libLevel===l?'selected':''}>${l}</option>`).join('')}</select>
      <select style="width:160px" onchange="setState({libFocus:this.value})">
        <option value="">All skills</option>
        ${SKILLS().map(s=>`<option value="${s.id}" ${libFocus===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select>
    </div>
    <p style="color:#475569;font-size:12px;margin-bottom:8px">${sorted.length} drills · ${favorites.length} starred</p>
    ${sorted.map(d=>renderDrillCard(d,{showFav:true,showEdit:true})).join('')}
  </div>`;
}

function renderDrillCard(drill, opts={}) {
  const { showFav=false, showEdit=false, playerCount=0, compact=false, matchedTags=[] } = opts;
  const isFav = state.favorites.includes(drill.id);
  const warn = playerCount > 0 && drill.players > 1 && playerCount < drill.players;
  const matched = matchedTags.filter(id => (drill.focus||[]).includes(id));
  const hasMatch = matched.length > 0;
  const borderColor = hasMatch ? 'rgba(99,102,241,0.45)' : isFav ? 'rgba(232,119,34,0.3)' : warn ? 'rgba(239,68,68,0.35)' : 'rgba(255,255,255,0.08)';
  const bg = hasMatch ? 'rgba(99,102,241,0.06)' : isFav ? 'rgba(232,119,34,0.06)' : 'rgba(255,255,255,0.03)';
  const id = 'dc_' + drill.id;
  return `
  <div style="background:${bg};border:1px solid ${borderColor};border-radius:10px;padding:${compact?'11px 13px':'15px 17px'};margin-bottom:9px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
      <div style="flex:1;cursor:pointer" onclick="toggleDrillExpand('${drill.id}')">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;">
          <span>${drill.format==='game'?'🏀':'⚙️'}</span>
          ${isFav?'<span>⭐</span>':''}
          <span class="condensed" style="font-size:15px;font-weight:700;color:#fff">${drill.name}</span>
          ${warn?`<span style="font-size:11px;color:#ef4444;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:4px;padding:1px 6px">needs ${drill.players}+</span>`:''}
          ${hasMatch?`<span style="font-size:11px;color:#818cf8;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:4px;padding:1px 7px;font-weight:700">matched</span>`:''}
          ${drill.phase?`<span style="font-size:10px;color:#475569;background:#1e293b;border-radius:4px;padding:1px 6px">${drill.phase}</span>`:''}
        </div>
        <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;">
          ${(drill.levels||[]).map(l=>badge(l,LEVEL_COLORS[l])).join('')}
          ${(drill.focus||[]).slice(0,3).map(id => {
            const isMatch = matchedTags.includes(id);
            return `<span class="badge" style="background:${isMatch?'rgba(99,102,241,0.2)':'rgba(232,119,34,0.13)'};color:${isMatch?'#818cf8':'#e87722'};border:1px solid ${isMatch?'rgba(99,102,241,0.4)':'rgba(232,119,34,0.3)'};${isMatch?'font-weight:800;':''}">${isMatch?'→ ':''} ${skillLabel(id)}</span>`;
          }).join('')}
          ${badge((drill.duration||0)+'min','#94a3b8')}
          ${badge((drill.players<=1?'1':drill.players+'+')+' players', warn?'#ef4444':'#475569')}
        </div>
        ${hasMatch?`<div style="margin-top:7px;display:flex;align-items:center;gap:6px">
          <span style="color:#818cf8;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase">Why chosen:</span>
          <span style="color:#a5b4fc;font-size:11px">Addresses ${matched.map(id => '"'+skillLabel(id)+'"').join(', ')}</span>
        </div>`:''}
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
        ${showFav?`<button onclick="toggleFav('${drill.id}')" style="background:none;border:none;cursor:pointer;font-size:15px;opacity:${isFav?1:.3}">⭐</button>`:''}
        ${showEdit?`${btn('Edit','#334155',`editDrill('${drill.id}')`)} ${btn('✕','#7f1d1d',`deleteDrill('${drill.id}')`)} `:''}
      </div>
    </div>
    <div id="${id}" style="display:none;margin-top:10px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px">
      <p style="color:#cbd5e1;font-size:13px;line-height:1.6;margin-bottom:8px">${drill.description}</p>
      <p style="color:#94a3b8;font-size:12px"><strong style="color:#e87722">Cues: </strong>${(drill.coachingCues||[]).filter(Boolean).join(' · ')}</p>
      <p style="color:#475569;font-size:11px;margin-top:6px">Source: ${drill.source}</p>
    </div>
  </div>`;
}

function renderConcepts() {
  const { conceptSelected, conceptFilter } = state;
  const cats = [...new Set(CONCEPTS.map(c=>c.category))];

  if (conceptSelected) {
    const c = conceptSelected;
    const color = CAT_COLORS[c.category]||'#e87722';
    return `
    <div>
      <button class="btn" style="background:#1e293b;padding:7px 14px;font-size:12px;margin-bottom:20px" onclick="setState({conceptSelected:null})">← Back to Concepts</button>

        </div>
        <p style="color:#94a3b8;font-size:13px;line-height:1.7;margin:0 0 18px;border-bottom:1px solid #1e293b;padding-bottom:18px">${c.summary}</p>

        ${c.keyIdeas.map(idea=>{
          // Check if this idea contains example sub-items (lines starting with •)
          if (idea.includes('\n•')) {
            const [heading, ...lines] = idea.split('\n');
            return `<div style="margin-bottom:10px">
              <div style="display:flex;gap:10px;margin-bottom:6px"><span style="color:${color};flex-shrink:0;margin-top:2px">→</span><p style="color:#cbd5e1;font-size:13px;line-height:1.6;margin:0;font-weight:600">${heading}</p></div>
              <div style="margin-left:20px;display:grid;gap:5px">
                ${lines.map(l=>l.trim()).filter(Boolean).map(l=>`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:8px 12px;font-size:12px;color:#94a3b8;line-height:1.6">${l.replace(/^•\s*/,'<span style="color:'+color+';font-weight:700;margin-right:6px">→</span>')}</div>`).join('')}
              </div>
            </div>`;
          }
          return `<div style="display:flex;gap:10px;margin-bottom:8px"><span style="color:${color};flex-shrink:0;margin-top:2px">→</span><p style="color:#cbd5e1;font-size:13px;line-height:1.6;margin:0">${idea}</p></div>`;
        }).join('')}
        <h3 class="condensed" style="font-size:14px;color:${color};letter-spacing:.06em;text-transform:uppercase;margin:18px 0 10px">Teaching Progression</h3>
        ${c.teachingProgression.map((step,i)=>`<div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start"><span style="background:${color};color:#000;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</span><p style="color:#cbd5e1;font-size:13px;line-height:1.6;margin:0">${step}</p></div>`).join('')}
        <div style="margin-top:16px;background:rgba(255,255,255,.03);border-radius:8px;padding:8px 12px">
          <p style="color:#475569;font-size:11px;margin:0;font-style:italic">📖 ${c.saramaRef}</p>
        </div>
      </div>
    </div>`;
  }

  const filtered = conceptFilter ? CONCEPTS.filter(c=>c.category===conceptFilter) : CONCEPTS;
  return `
  <div>
    <div style="margin-bottom:20px">
      <h2 class="condensed" style="font-size:22px;color:#fff;margin-bottom:4px">Team Concepts</h2>
      <p style="color:#475569;font-size:13px">Core ideas from <em style="color:#94a3b8">Transforming Basketball</em> — with how to teach them.</p>
    </div>
    <div class="toggle-row" style="margin-bottom:16px">
      <button class="toggle-btn" style="background:${!conceptFilter?'#e87722':'#1e293b'}" onclick="setState({conceptFilter:''})">All</button>
      ${cats.map(c=>`<button class="toggle-btn" style="background:${conceptFilter===c?(CAT_COLORS[c]||'#e87722'):'#1e293b'}" onclick="setState({conceptFilter:'${c}'})">${c}</button>`).join('')}
    </div>
    <div class="grid2">
      ${filtered.map(c=>{const color=CAT_COLORS[c.category]||'#e87722';return`
      <div onclick="setState({conceptSelected:${JSON.stringify(c).replace(/"/g,'&quot;')}})" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .2s,background .2s" onmouseover="this.style.borderColor='${color}55';this.style.background='rgba(255,255,255,.055)'" onmouseout="this.style.borderColor='rgba(255,255,255,.07)';this.style.background='rgba(255,255,255,.03)'">
        <div style="font-size:20px;margin-bottom:7px">${c.icon}</div>

        <h3 class="condensed" style="font-size:15px;color:#fff;margin:8px 0 5px">${c.title}</h3>
        <p style="color:#64748b;font-size:12px;line-height:1.5;margin:0 0 8px">${c.summary.slice(0,80)}…</p>
        <p style="color:${color};font-size:11px;margin:0">View →</p>
      </div>`;}).join('')}
    </div>
  </div>`;
}

// ── Event Handlers ────────────────────────────────────────────────────────────
function toggleDrillExpand(id) {
  const el = document.getElementById('dc_'+id);
  if (el) el.style.display = el.style.display==='none'?'block':'none';
}
function toggleFav(id) {
  state.favorites = state.favorites.includes(id)?state.favorites.filter(x=>x!==id):[...state.favorites,id];
  persist(); render();
}
function togglePlanFocus(id) {
  state.planFocus = state.planFocus.includes(id) ? state.planFocus.filter(x=>x!==id) : [...state.planFocus, id];
  const pills = document.querySelectorAll('[data-plan-skill]');
  if (pills.length > 0) {
    pills.forEach(btn => {
      const sid = btn.getAttribute('data-plan-skill');
      const on = state.planFocus.includes(sid);
      btn.style.background = on ? '#e87722' : '#1e293b';
      btn.style.borderColor = on ? '#e87722' : '#334155';
      btn.style.color = on ? '#fff' : '#64748b';
      btn.style.fontWeight = on ? 700 : 400;
    });
  } else { render(); }
}
function togglePlanPlayer(pid) { state.planPlayerIds = state.planPlayerIds.includes(pid)?state.planPlayerIds.filter(x=>x!==pid):[...state.planPlayerIds,pid]; render(); }
function buildPlan() { state.generatedPlan = generatePlan(); state.planSaved = false; state.planStep = 1; render(); }
function saveSession() {
  const plan = state.generatedPlan;
  const { planMode, planTeamId, planPlayerIds, planDuration, planFocus, teams } = state;
  const session = {
    id: uid('s'), planTitle: plan.title, date: today(),
    duration: planDuration, focus: planFocus, notes: plan.coachNotes||'',
    teamId: planMode==='team'?planTeamId:null,
    playerIds: planMode==='team'?(teams.find(t=>t.id===planTeamId)?.playerIds||[]):planPlayerIds,
  };
  state.sessions = [...state.sessions, session];

// ── Wheel Items Builder ───────────────────────────────────────────
function buildWheelItems() {
  const drills = state.drills.filter(d => {
    if (gState.wheelFilter === 'quiz') return false;
    return d.levels.includes(state.planLevel || 'intermediate');
  });
  const quizItem = gState.wheelFilter === 'drills' ? [] : [
    { id:'quiz-easy', name:'Quick Quiz', icon:'🧠', type:'quiz', difficulty:'easy', color:'#06b6d4' },
    { id:'quiz-med', name:'Brain Test', icon:'🧩', type:'quiz', difficulty:'medium', color:'#8b5cf6' },
    { id:'quiz-hard', name:'Expert Quiz', icon:'🏆', type:'quiz', difficulty:'hard', color:'#f59e0b' },
  ];
  const drillItems = drills.slice(0, 8).map(d => ({ id:d.id, name:d.name, icon:d.format==='game'?'🏀':'⚙️', type:'drill', color:'#e87722', drill:d }));
  return [...drillItems, ...quizItem].slice(0, 10);
}

// ── Spin the Wheel ────────────────────────────────────────────────
function renderWheel() {
  const items = buildWheelItems();
  if (items.length < 2) return `<p style="color:#475569;font-size:13px">Add more drills to your library to use the wheel.</p>`;
  const n = items.length;
  const arc = 360 / n;
  const colors = ['#e87722','#3b82f6','#22c55e','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#f97316','#10b981','#ec4899'];
  const r = 130, cx = 150, cy = 150;

  // SVG wheel slices
  function polarToCart(angle, radius) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + radius * Math.cos(rad), y: cy + radius * Math.sin(rad) };
  }
  function makeSlice(i) {
    const startAngle = i * arc;
    const endAngle = (i + 1) * arc;
    const start = polarToCart(startAngle, r);
    const end = polarToCart(endAngle, r);
    const large = arc > 180 ? 1 : 0;
    const midAngle = startAngle + arc / 2;
    const mid = polarToCart(midAngle, r * 0.62);
    const color = colors[i % colors.length];
    return `
      <path d="M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 1 ${end.x} ${end.y} Z" fill="${color}" stroke="#060d18" stroke-width="2"/>
      <text x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#fff" font-family="IBM Plex Sans,sans-serif" font-weight="600" transform="rotate(${midAngle},${mid.x},${mid.y})">${items[i].icon}</text>`;
  }

  const slices = items.map((_,i) => makeSlice(i)).join('');
  const result = gState.spinResult;

  return `
  <div style="text-align:center">
    <!-- Filter -->
    <div class="toggle-row" style="justify-content:center;margin-bottom:20px">
      <span style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;align-self:center;margin-right:4px">Include:</span>
      ${[['all','Drills + Quiz'],['drills','Drills Only'],['quiz','Quiz Only']].map(([v,l])=>`<button class="toggle-btn" style="background:${gState.wheelFilter===v?'#e87722':'#1e293b'};font-size:11px" onclick="setWheelFilter('${v}')">${l}</button>`).join('')}
    </div>

    <!-- Wheel -->
    <div style="position:relative;display:inline-block;margin-bottom:20px">
      <svg id="spin-wheel" width="300" height="300" style="filter:drop-shadow(0 0 20px rgba(232,119,34,0.3));transition:transform 0s">
        <g id="wheel-slices" style="transform-origin:150px 150px;transform:rotate(${gState.spinAngle}deg)">
          ${slices}
          <circle cx="${cx}" cy="${cy}" r="22" fill="#0f172a" stroke="#e87722" stroke-width="3"/>
          <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#e87722">🏀</text>
        </g>
        <!-- Pointer -->
        <polygon points="${cx},${cy-r-10} ${cx-8},${cy-r+8} ${cx+8},${cy-r+8}" fill="#e87722"/>
      </svg>
    </div>

    <!-- Spin button -->
    <div style="margin-bottom:20px">
      <button onclick="spinWheel()" ${gState.spinning?'disabled':''} style="background:${gState.spinning?'#334155':'#e87722'};color:#fff;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase;cursor:${gState.spinning?'not-allowed':'pointer'}">
        ${gState.spinning?'Spinning…':'🎡 Spin!'}
      </button>
    </div>

    <!-- Result -->
    ${result ? renderSpinResult(result) : '<p style="color:#334155;font-size:13px">Spin to select the next drill or challenge!</p>'}
  </div>`;
}

function setWheelFilter(f) { gState.wheelFilter = f; gState.spinResult = null; document.getElementById('game-content').innerHTML = renderGameSection(); }

function spinWheel() {
  if (gState.spinning) return;
  const items = buildWheelItems();
  const n = items.length;
  const arc = 360 / n;
  // Pick random item
  const winIdx = Math.floor(Math.random() * n);
  // Spin 5-8 full rotations + land on winner
  const extraSpins = (5 + Math.floor(Math.random() * 3)) * 360;
  // Pointer is at top (0°). Slice i starts at i*arc. To land slice winIdx under pointer:
  const targetAngle = 360 - (winIdx * arc + arc / 2);
  const totalAngle = gState.spinAngle + extraSpins + ((targetAngle - gState.spinAngle % 360 + 360) % 360);

  gState.spinning = true;
  gState.spinResult = null;
  document.getElementById('game-content').innerHTML = renderGameSection();

  const wheel = document.getElementById('wheel-slices');
  if (wheel) {
    wheel.style.transition = 'transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99)';
    wheel.style.transform = `rotate(${totalAngle}deg)`;
  }

  setTimeout(() => {
    gState.spinning = false;
    gState.spinAngle = totalAngle % 360;
    gState.spinResult = items[winIdx];
    document.getElementById('game-content').innerHTML = renderGameSection();
  }, 3600);
}

    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button onclick="launchRandomQuiz()" style="background:#e87722;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;flex:1">
        🎲 Random Question
      </button>
    </div>
    <p style="color:#475569;font-size:12px;margin-bottom:10px">${filtered.length} questions</p>
    ${filtered.map(q=>`
    <div onclick="launchQuiz('${q.id}')" class="card" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            ${badge(q.category,'#3b82f6')}
            ${badge(q.difficulty, diffColors[q.difficulty]||'#64748b')}
            ${badge(q.points+' pts', ptColors[q.points]||'#64748b')}
          </div>
          <p style="color:#e2e8f0;font-size:13px;line-height:1.5;margin:0">${q.question}</p>
        </div>
        <span style="color:#e87722;font-size:13px;flex-shrink:0">→</span>
      </div>
    </div>`).join('')}
  </div>`;
}

function renderActiveQuiz() {
  const q = gState.activeQuiz;
  const answered = gState.quizAnswered;
  const selected = gState.quizSelected;
  const diffColors = {easy:'#22c55e',medium:'#f97316',hard:'#ef4444'};

  return `
  <div style="max-width:540px">
    <button class="btn" style="background:#1e293b;padding:6px 12px;font-size:11px;margin-bottom:16px" onclick="closeQuiz()">← Back to Quiz List</button>
    <div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px">
      <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
        ${badge(q.category,'#3b82f6')}
        ${badge(q.difficulty,diffColors[q.difficulty]||'#64748b')}
        ${badge(q.points+' pts for correct','#f59e0b')}
      </div>
      <p style="color:#fff;font-size:16px;line-height:1.6;font-weight:600;margin-bottom:18px">${q.question}</p>
      <div style="display:grid;gap:8px;margin-bottom:16px">
        ${q.options.map((opt,i)=>{
          let bg = '#1e293b', border = 'rgba(255,255,255,0.08)', textColor = '#e2e8f0';
          if (answered) {
            if (i === q.answer) { bg='rgba(34,197,94,0.15)'; border='#22c55e'; textColor='#22c55e'; }
            else if (i === selected) { bg='rgba(239,68,68,0.15)'; border='#ef4444'; textColor='#ef4444'; }
          } else if (i === selected) { bg='rgba(232,119,34,0.15)'; border='#e87722'; textColor='#e87722'; }
          return `<div onclick="${answered?'':'selectAnswer('+i+')'}" style="background:${bg};border:1px solid ${border};border-radius:8px;padding:12px 14px;cursor:${answered?'default':'pointer'};color:${textColor};font-size:13px;line-height:1.5;transition:all .15s">
            <span style="font-weight:700;margin-right:8px">${['A','B','C','D'][i]}.</span>${opt}
          </div>`;
        }).join('')}
      </div>
      ${!answered?`<button onclick="submitAnswer()" ${selected===null||selected===undefined?'disabled':''} style="background:${selected!==null&&selected!==undefined?'#e87722':'#334155'};color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:${selected!==null&&selected!==undefined?'pointer':'not-allowed'};width:100%">Submit Answer</button>`:''}
      ${answered?`
      <div style="background:${selected===q.answer?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)'};border:1px solid ${selected===q.answer?'#22c55e44':'#ef444444'};border-radius:8px;padding:14px;margin-bottom:14px">
        <p style="color:${selected===q.answer?'#22c55e':'#ef4444'};font-size:14px;font-weight:700;margin-bottom:6px">${selected===q.answer?'✓ Correct! +'+q.points+' points':'✗ Not quite'}</p>
        <p style="color:#94a3b8;font-size:13px;line-height:1.6;margin:0">${q.explanation}</p>
      </div>
      ${selected===q.answer?renderAwardPoints('quiz-correct',q.question.slice(0,40)+'…'):''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button onclick="launchRandomQuiz()" style="background:#e87722;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;flex:1">Next Question 🎲</button>
        <button onclick="closeQuiz()" style="background:#1e293b;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">Back to List</button>
      </div>`:''}
    </div>
  </div>`;
}

function setQuizFilter(f) { gState.quizFilter=f; document.getElementById('game-content').innerHTML=renderGameSection(); }
function setQuizDiff(d) { gState.quizDiff=d; document.getElementById('game-content').innerHTML=renderGameSection(); }
function launchQuiz(id) { gState.activeQuiz=QUIZ_BANK.find(q=>q.id===id); gState.quizAnswered=false; gState.quizSelected=null; document.getElementById('game-content').innerHTML=renderGameSection(); }
function launchRandomQuiz() {
  const pool = QUIZ_BANK.filter(q=>(gState.quizFilter==='all'||q.category===gState.quizFilter)&&(gState.quizDiff==='all'||!gState.quizDiff||q.difficulty===gState.quizDiff));
  if (!pool.length) return;
  const q = pool[Math.floor(Math.random()*pool.length)];
  launchQuiz(q.id);
}
function launchQuizFromWheel(diff) { gState.gameSection='quiz'; gState.quizDiff=diff; gState.quizFilter='all'; launchRandomQuiz(); document.getElementById('game-content').innerHTML=renderGameSection(); }
function selectAnswer(i) { gState.quizSelected=i; document.getElementById('game-content').innerHTML=renderGameSection(); }
function submitAnswer() { gState.quizAnswered=true; document.getElementById('game-content').innerHTML=renderGameSection(); }
function closeQuiz() { gState.activeQuiz=null; gState.quizAnswered=false; gState.quizSelected=null; document.getElementById('game-content').innerHTML=renderGameSection(); }

// ── Scoreboard ────────────────────────────────────────────────────
function renderScoreboard() {
  const scores = gState.sessionScores;
  const log = gState.sessionLog;
  const sorted = state.players
    .map(p=>({...p, pts: scores[p.id]||0}))
    .sort((a,b)=>b.pts-a.pts);

  const medalColor = i => ['#f59e0b','#94a3b8','#cd7c2f'][i]||'#334155';
  const medalIcon = i => ['🥇','🥈','🥉'][i]||'#';

  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 class="condensed" style="font-size:18px;color:#fff">Session Leaderboard</h3>
      <button class="btn" style="background:#7f1d1d;padding:6px 12px;font-size:11px" onclick="resetScores()">Reset Scores</button>
    </div>

    ${state.players.length===0?`<p style="color:#475569;font-size:13px;margin-bottom:20px">Add players in the Players tab to track scores.</p>`:
    `<div style="margin-bottom:24px">
      ${sorted.map((p,i)=>`
      <div style="background:rgba(255,255,255,.03);border:1px solid ${i===0&&p.pts>0?'rgba(245,158,11,0.3)':'rgba(255,255,255,0.07)'};border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px">
        <span style="font-size:20px;width:28px;text-align:center">${p.pts>0?medalIcon(i):'—'}</span>
        <div style="flex:1">
          <p style="color:#fff;font-size:15px;font-weight:700;font-family:'Barlow Condensed',sans-serif;margin:0 0 2px">${p.name}</p>
          <div style="display:flex;gap:5px">${p.level?badge(p.level,LEVEL_COLORS[p.level]):''}</div>
        </div>
        <div style="text-align:right">
          <p style="color:${p.pts>0?medalColor(i):'#334155'};font-size:22px;font-weight:800;font-family:'Barlow Condensed',sans-serif;margin:0">${p.pts}</p>
          <p style="color:#475569;font-size:10px;margin:0">points</p>
        </div>
      </div>`).join('')}
    </div>`}

    <!-- Manual award -->
    <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:20px">
      <p style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Award Points Manually</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${[50,100,150,200,300].map(p=>`<button class="toggle-btn" style="background:${gState.manualPts===p?'#22c55e':'#1e293b'};font-size:12px;padding:5px 12px" onclick="setManualPts(${p})">${p} pts</button>`).join('')}
      </div>
      <input id="award-reason" placeholder="Reason (e.g. Made 5 layups in a row)" style="margin-bottom:8px"/>
      <div class="toggle-row">
        ${state.players.map(p=>`<button class="toggle-btn" style="background:#1e293b;font-size:11px" onclick="manualAward('${p.id}','${p.name}')">${p.name}</button>`).join('')}
      </div>
    </div>

    <!-- Activity log -->
    ${log.length>0?`
    <div>
      <p style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Activity Log</p>
      <div style="max-height:240px;overflow-y:auto">
        ${[...log].reverse().slice(0,20).map(entry=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-bottom:1px solid #1e293b">
          <div>
            <span style="color:#e2e8f0;font-size:12px;font-weight:600">${entry.playerName}</span>
            <span style="color:#475569;font-size:11px;margin-left:8px">${entry.reason}</span>
          </div>
          <span style="color:#22c55e;font-size:13px;font-weight:700">+${entry.points}</span>
        </div>`).join('')}
      </div>
    </div>`:''}
  </div>`;
}

function awardPoints(playerId, playerName, reason, points) {
  gState.sessionScores[playerId] = (gState.sessionScores[playerId]||0) + points;
  gState.sessionLog.push({ playerId, playerName, points, reason, time: new Date().toLocaleTimeString() });
  saveGames();
  document.getElementById('game-content').innerHTML = renderGameSection();
}

function setManualPts(p) { gState.manualPts=p; document.getElementById('game-content').innerHTML=renderGameSection(); }

function manualAward(playerId, playerName) {
  const reason = document.getElementById('award-reason')?.value || 'Manual award';
  const pts = gState.manualPts || 100;
  awardPoints(playerId, playerName, reason, pts);
}

function resetScores() {
  
  gState.sessionScores = {}; gState.sessionLog = []; saveGames();
  document.getElementById('game-content').innerHTML = renderGameSection();
}

// ── Patch tab list to include Games ──────────────────────────────
const _origRender = render;
window.render = function() {
  _origRender();
  // Inject Games tab if not present
  const tabBar = document.querySelector('[style*="overflow-x:auto"]');
  if (tabBar && !document.getElementById('tab-games')) {
    const btn = document.createElement('button');
    btn.id = 'tab-games';
    btn.className = 'tab-btn' + (state.tab === 'games' ? ' active' : '');
    btn.textContent = 'Games 🎡';
    btn.onclick = () => { state.tab = 'games'; window.render(); };
    tabBar.appendChild(btn);
  }
  if (tabBar && !document.getElementById('tab-settings')) {
    const btn2 = document.createElement('button');
    btn2.id = 'tab-settings';
    btn2.className = 'tab-btn' + (state.tab === 'settings' ? ' active' : '');
    btn2.textContent = '⚙ Settings';
    btn2.onclick = () => { state.tab = 'settings'; window.render(); };
    tabBar.appendChild(btn2);
  }
  // If games tab active, replace content
  if (state.tab === 'games') {
    const content = document.querySelector('[style*="padding:22px 20px"]');
    if (content) content.innerHTML = renderGames();
  }
  if (state.tab === 'settings') {
    const content = document.querySelector('[style*="padding:22px 20px"]');
    if (content) content.innerHTML = renderSettings();
  }
};

// Initial patch render
window.render();
</script>
<script>
// ═══════════════════════════════════════════════════════════════════
// SETTINGS MODULE
// ═══════════════════════════════════════════════════════════════════

function renderSettings() {
  const s = state.settingsSection || 'attributes';
  const sections = [
    ['attributes', '🏷 Skills'],

  ];

  return `
  <div>
    <div style="margin-bottom:20px">
      <h2 class="condensed" style="font-size:22px;color:#fff;margin-bottom:4px">Settings</h2>
      <p style="color:#475569;font-size:13px">Manage picklists, player attributes, and app defaults.</p>
    </div>

    <div class="toggle-row" style="margin-bottom:24px">
      ${sections.map(([key,label])=>`<button class="toggle-btn" style="background:${s===key?'#e87722':'#1e293b'};padding:7px 14px;font-size:12px" onclick="setSettingsSection('${key}')">${label}</button>`).join('')}
    </div>

    <div id="settings-content">
      ${renderSettingsSection(s)}
    </div>
  </div>`;
}

function setSettingsSection(s) {
  state.settingsSection = s;
  const el = document.getElementById('settings-content');
  if (el) el.innerHTML = renderSettingsSection(s);
  document.querySelectorAll('.toggle-row .toggle-btn').forEach(b => {
    if (b.textContent.includes(s)) b.style.background = '#e87722';
  });
}

function renderSettingsSection(s) {
  if (s === 'attributes') return renderAttributeSettings();

  return '';
}

// ── Skill Settings ───────────────────────────────────────────────
function renderAttributeSettings() {
  const skills = SKILLS();
  return `
  <div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <p style="color:#94a3b8;font-size:13px;line-height:1.6;margin:0">Skills are a single shared list used on both drills and player profiles. Tag a skill on a drill to indicate what it develops. Rate a skill on a player to indicate strength or weakness. <strong style="color:#ef4444">Weakness ratings</strong> automatically prioritise drills that share the same skill when generating a plan.</p>
      <button class="btn" style="background:#e87722;padding:7px 14px;font-size:12px;font-weight:700;flex-shrink:0" onclick="showAddAttribute()">+ Add Skill</button>
    </div>

    <div id="attr-form" style="display:none;margin-bottom:16px"></div>

    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:10px 12px;margin-bottom:14px">
      <div style="display:flex;gap:16px;font-size:11px;flex-wrap:wrap">
        <span style="color:#22c55e;font-weight:700">💪 S = Strength</span>
        <span style="color:#94a3b8;font-weight:700">➖ M = Mid</span>
        <span style="color:#ef4444;font-weight:700">⚠ W = Weakness → plan targets drills sharing this skill</span>
      </div>
    </div>

    <div style="display:grid;gap:7px">
      ${skills.length===0 ? `<p style="color:#334155;font-size:12px;font-style:italic">No skills defined yet.</p>` : ''}
      ${skills.map(s => `
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="flex:1">
          <span style="color:#fff;font-size:13px;font-weight:600">${s.label}</span>

        </div>
        <div style="display:flex;gap:5px">
          <button class="btn" style="background:#1e293b" onclick="editAttribute('${s.id}')">Edit</button>
          <button class="btn" style="background:#7f1d1d" onclick="deleteAttribute('${s.id}')">✕</button>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── Generic List Settings (positions, note cats) ──────────────────
function renderListSettings(key, title, placeholder, description) {
  const settings = getSettings();
  const list = settings[key] || [];
  return `
  <div>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:16px">${description}</p>
    <div style="display:flex;gap:7px;margin-bottom:12px">
      <input id="list-input-${key}" placeholder="${placeholder}" style="flex:1"/>
      <button class="btn" style="background:#e87722;padding:7px 14px;font-size:12px;font-weight:700" onclick="addListItem('${key}')">Add</button>
    </div>
    <div style="display:grid;gap:6px">
      ${list.map((item,i)=>`
      <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:#e2e8f0;font-size:13px">${item}</span>
        <button class="btn" style="background:#7f1d1d" onclick="removeListItem('${key}',${i})">✕</button>
      </div>`).join('')}
    </div>
    ${list.length===0?`<p style="color:#334155;font-size:12px;font-style:italic;padding:8px 0">No items yet.</p>`:''}
  </div>`;
}

function addListItem(key) {
  const input = document.getElementById('list-input-'+key);
  const val = input?.value?.trim();
  if (!val) return;
  const settings = getSettings();
  if (!(settings[key]||[]).includes(val)) {
    settings[key] = [...(settings[key]||[]), val];
    state.settings = {...settings};
    persist();
  }
  input.value = '';
  const el = document.getElementById('settings-content');
  if (el) el.innerHTML = renderSettingsSection(state.settingsSection);
}

function removeListItem(key, idx) {
  const settings = getSettings();
  settings[key] = (settings[key]||[]).filter((_,i)=>i!==idx);
  state.settings = {...settings};
  persist();
  const el = document.getElementById('settings-content');
  if (el) el.innerHTML = renderSettingsSection(state.settingsSection);
}

// ── Focus Area Settings ───────────────────────────────────────────
function renderFocusSettings() {
  const settings = getSettings();
  const list = settings.focusOptions || [];
  return `
  <div>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:6px">Focus areas appear on drills and drive plan generation. They also appear in the plan builder's focus selector.</p>
    <p style="color:#e87722;font-size:12px;margin-bottom:16px">⚠ Removing a focus area will not update existing drills — those drills just won't match until updated.</p>
    <div style="display:flex;gap:7px;margin-bottom:12px">
      <input id="list-input-focusOptions" placeholder="e.g. post-play, off-ball movement"/>
      <button class="btn" style="background:#e87722;padding:7px 14px;font-size:12px;font-weight:700" onclick="addListItem('focusOptions')">Add</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px">
      ${list.map((item,i)=>`
      <div style="background:rgba(232,119,34,.1);border:1px solid rgba(232,119,34,.3);border-radius:7px;padding:6px 10px;display:flex;align-items:center;gap:7px">
        <span style="color:#e87722;font-size:12px;font-weight:600">${item}</span>
        <button onclick="removeListItem('focusOptions',${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:0;line-height:1">✕</button>
      </div>`).join('')}
    </div>
    ${list.length===0?`<p style="color:#334155;font-size:12px;font-style:italic;padding:8px 0">No focus areas defined.</p>`:''}
    <div style="margin-top:16px;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 14px">
      <p style="color:#475569;font-size:12px;margin:0">Tip: Focus areas must match exactly what is used on drills for the plan generator to connect them. Keep labels lowercase and consistent.</p>
    </div>
  </div>`;
}

// ── Skill add/edit form functions ─────────────────────────────────
let _attrForm = {};
function showAddAttribute() {
  _attrForm = { id: uid('a'), label:'', focusTag:'', _new:true };
  renderAttrForm();
}
function editAttribute(id) {
  const s = SKILLS().find(x=>x.id===id);
  if (!s) return;
  _attrForm = {...s};
  renderAttrForm();
}
function renderAttrForm() {
  const f = _attrForm;
  const el = document.getElementById('attr-form');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = `
  <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:18px">
    <h3 class="condensed" style="font-size:17px;color:#e87722;margin-bottom:14px">${f._new?'New Skill':'Edit Skill'}</h3>
    <div class="grid2">
      <div class="span2">
        <div class="label">Skill Label</div>
        <input id="af-label" value="${f.label||''}" placeholder="e.g. Court vision"/>
      </div>
  
    </div>
    <div style="display:flex;gap:7px;margin-top:14px">
      <button class="btn" style="background:#e87722;padding:7px 18px;font-size:13px" onclick="saveAttribute()">Save</button>
      <button class="btn" style="background:#334155;padding:7px 14px;font-size:13px" onclick="cancelAttr()">Cancel</button>
    </div>
  </div>`;
}
function saveAttribute() {
  const label = document.getElementById('af-label')?.value?.trim();
  if (!label) return;
  const skill = { id: _attrForm.id||uid('s'), label };
  const skills = SKILLS();
  const settings = getSettings();
  settings.skills = skills.find(s=>s.id===skill.id) ? skills.map(s=>s.id===skill.id?skill:s) : [...skills, skill];
  state.settings = {...settings};
  _attrForm = {};
  persist();
  const el = document.getElementById('settings-content');
  if (el) el.innerHTML = renderSettingsSection('attributes');
  const form = document.getElementById('attr-form');
  if (form) form.style.display='none';
}
function cancelAttr() {
  _attrForm = {};
  const el = document.getElementById('attr-form');
  if (el) el.style.display='none';
}
function deleteAttribute(id) {
  const skill = SKILLS().find(s=>s.id===id);
  const label = skill ? skill.label : id;
  const settings = getSettings();
  settings.skills = SKILLS().filter(s=>s.id!==id);
  state.players = state.players.map(p=>({...p, notes:(p.notes||[]).filter(n=>n._skill!==id&&n._attr!==id)}));
  state.teams   = state.teams.map(t=>({...t, notes:(t.notes||[]).filter(n=>n._skill!==id&&n._attr!==id)}));
  state.settings = {...settings};
  persist();
  const el = document.getElementById('settings-content');
  if (el) el.innerHTML = renderSettingsSection('attributes');
}
</script>
